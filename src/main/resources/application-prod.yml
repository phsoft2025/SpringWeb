# 生产环境配置 - 不包含任何默认密码
# 所有敏感信息必须通过环境变量提供，否则启动失败
server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL}                                # 必须提供，无默认值
    username: ${DB_USERNAME}                       # 必须提供，无默认值
    password: ${DB_PASSWORD}                       # 必须提供，无默认值
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none                               # 生产环境禁止自动建表
    show-sql: false                                 # 生产环境关闭SQL打印
    properties:
      hibernate:
        format_sql: false

# Jasypt加密配置
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD}          # 必须提供，无默认值
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator
